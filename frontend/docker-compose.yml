version: '3.8'

services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ainu_frontend
    ports:
      - "8501:8501"
    environment:
      BACKEND_API_URL: http://backend:8000/api/v1
      STREAMLIT_CLIENT_THEME_BASE: light
    volumes:
      - .:/app
    networks:
      - ainu_network
    depends_on:
      - backend

  backend:
    image: ainu_backend:latest
    container_name: ainu_backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://ainu_user:ainu_dev_pass@db:5432/ainu
      SECRET_KEY: seu-secret-key-aqui
    networks:
      - ainu_network
    depends_on:
      - db

  db:
    image: postgres:15
    container_name: ainu_postgres
    environment:
      POSTGRES_DB: ainu
      POSTGRES_USER: ainu_user
      POSTGRES_PASSWORD: ainu_dev_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - ainu_network

networks:
  ainu_network:
    driver: bridge

volumes:
  postgres_data:
