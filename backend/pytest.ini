[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -v
    --strict-markers
    --disable-warnings
markers =
    auth: testes de autenticação
    paises: testes de gestão de países
    calculos: testes de fórmulas
    simulacoes: testes de simulações
    admin: testes administrativos
