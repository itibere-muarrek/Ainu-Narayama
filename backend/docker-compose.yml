version: '3.8'

services:
  db:
    image: postgres:15
    container_name: ainu_postgres
    environment:
      POSTGRES_DB: ainu
      POSTGRES_USER: ainu_user
      POSTGRES_PASSWORD: ainu_dev_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ainu_user -d ainu"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ainu_backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://ainu_user:ainu_dev_pass@db:5432/ainu
      SECRET_KEY: seu-secret-key-super-seguro-minimo-32-caracteres
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 60
      ADMIN_EMAIL: narayama.live@gmail.com
      ENVIRONMENT: development
    volumes:
      - .:/app
    networks:
      - ainu_network

networks:
  ainu_network:
    driver: bridge

volumes:
  postgres_data:
