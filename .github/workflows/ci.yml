name: CI

# Não faz deploy — Render redesploya sozinho a cada push (ver
# render.yaml). Este workflow só valida que o código ainda importa
# corretamente e que os dados de referência (28 países) continuam
# consistentes antes de qualquer push chegar ao Render.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Instalar dependências
        run: pip install -r app/requirements.txt

      - name: Checagem de regressão (28 países, config/CSV sincronizados)
        run: |
          python -c "
          import pandas as pd
          from src.config import PAISES, AJUSTES_FALSEABILIDADE_POR_PAIS
          from src.indices import calcular_ngii_puro, calcular_fator_geracional, calcular_n_base, classificar_zona_n_base, normalizar_n_base
          from src.falseability import aplicar_protocolo_falseabilidade, aplicar_protocolo_falseabilidade_simplificado, aplicar_falseabilidade_quantitativa

          assert len(PAISES) == 28, f'esperado 28 paises, encontrado {len(PAISES)}'

          df = pd.read_csv('docs/paises_perfil.csv')
          assert set(df['codigo']) == set(PAISES.keys()), 'docs/paises_perfil.csv e src/config.py divergem'

          ngii_bruto = calcular_ngii_puro(65.0, 110.0, 2.7, 1.6)
          ngii_puro = aplicar_falseabilidade_quantitativa(ngii_bruto, AJUSTES_FALSEABILIDADE_POR_PAIS['BRA'])
          n = calcular_n_base(ngii_puro, calcular_fator_geracional(1.60, 2.40))
          n_estrela = normalizar_n_base(n)
          assert n_estrela is not None and n_estrela > 0, 'normalizar_n_base falhou'
          classificar_zona_n_base(n)

          print('Checagem de regressão: OK')
          "

      - name: Checagem de regressão (série histórica, quinquenal)
        run: |
          python -c "
          from src.config import ANOS_ALVO_HISTORICO, PAISES
          from src.data_pipeline import executar_pipeline_historico

          df = executar_pipeline_historico()
          assert len(df) == len(PAISES) * len(ANOS_ALVO_HISTORICO), f'esperado {len(PAISES) * len(ANOS_ALVO_HISTORICO)} linhas, encontrado {len(df)}'
          assert df['n_base'].notna().all(), 'n_base com valores nulos na serie historica'
          assert df['n_estrela'].notna().all(), 'n_estrela com valores nulos na serie historica'

          print('Checagem de regressão (histórico): OK')
          "

      - name: Rodar teste de cálculo (Brasil, informativo)
        run: python test_calculo_brasil.py
